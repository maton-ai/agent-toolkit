name: Release
run-name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release, e.g. v0.1.2 (must match the committed package versions)"
        required: true
        type: string

jobs:
  prepare:
    name: Validate tag against committed versions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate version
        id: version
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag '$TAG'. Must be v1.2.3 (optionally with a prerelease suffix, e.g. v1.2.3-rc.1)."
            exit 1
          fi
          VERSION="${TAG#v}"

          # package.json / pyproject.toml are the source of truth: the tag must
          # match the committed versions. Bump those files (and commit) before
          # tagging — CI never rewrites them.
          check() {
            local label="$1" actual="$2"
            if [[ "$actual" != "$VERSION" ]]; then
              echo "::error::$label version ($actual) does not match tag ($VERSION). Bump $label and commit before tagging."
              exit 1
            fi
            echo "$label: $actual ✓"
          }

          mcp_version="$(node -p "require('./tools/modelcontextprotocol/package.json').version")"
          ts_version="$(node -p "require('./tools/typescript/package.json').version")"
          py_version="$(grep -E '^version = ' tools/python/pyproject.toml | sed -E 's/^version = "(.+)"/\1/')"

          check "@maton/mcp" "$mcp_version"
          check "@maton/agent-toolkit" "$ts_version"
          check "maton-agent-toolkit (pyproject)" "$py_version"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  npm-release:
    name: Publish to npm
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm

    defaults:
      run:
        working-directory: ./tools/modelcontextprotocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  agent-toolkit-npm-release:
    name: Publish agent-toolkit to npm
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm

    defaults:
      run:
        working-directory: ./tools/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi-release:
    name: Publish to PyPI
    needs: prepare
    runs-on: ubuntu-latest
    environment: pypi

    defaults:
      run:
        working-directory: ./tools/python

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Build
        run: |
          set -x
          make venv
          source .venv/bin/activate
          rm -rf build dist *.egg-info
          make build
          python -m twine check dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: tools/python/dist/
